// ─── 3DS SCREEN: 400x240 top screen (we target that resolution) ───────────────
var W = 400, H = 240;
var canvas = document.getElementById('c');
canvas.width  = W;
canvas.height = H;
// Scale to fill window while keeping aspect ratio
function resize() {
  var scaleX = window.innerWidth  / W;
  var scaleY = window.innerHeight / H;
  var scale  = Math.min(scaleX, scaleY);
  canvas.style.width  = Math.floor(W * scale) + 'px';
  canvas.style.height = Math.floor(H * scale) + 'px';
}
resize();
window.addEventListener('resize', resize);

var ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

// ─── CONSTANTS ────────────────────────────────────────────────────────────────
var GRAVITY    = 800;
var JUMP_VEL   = -280;
var SPEED      = 120;
var SPRINT     = 190;
var PW = 10, PH = 16; // player width/height

// ─── INPUT ────────────────────────────────────────────────────────────────────
var keys = {};
var jumpPressed = false;
var prevJump = false;

document.addEventListener('keydown', function(e) {
  keys[e.code] = true;
  // Arrow keys / WASD / space — prevent scroll
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].indexOf(e.code) >= 0)
    e.preventDefault();
});
document.addEventListener('keyup', function(e) { keys[e.code] = false; });

// 3DS D-Pad via gamepad API
function getGP() {
  var pads = navigator.getGamepads ? navigator.getGamepads() : [];
  for (var i = 0; i < pads.length; i++) if (pads[i]) return pads[i];
  return null;
}
function gpBtn(pad, i) { return !!(pad && pad.buttons[i] && (pad.buttons[i].pressed || pad.buttons[i].value > 0.5)); }
function gpAxis(pad, i) {
  if (!pad || pad.axes[i] === undefined) return 0;
  var v = pad.axes[i];
  return Math.abs(v) > 0.2 ? v : 0;
}

// Touch controls (on-screen d-pad for touchscreen / lower 3DS screen)
var touch = { left:false, right:false, jump:false, sprint:false };
function makeTouchBtn(id, prop) {
  var el = document.getElementById(id);
  if (!el) return;
  el.addEventListener('touchstart', function(e){ e.preventDefault(); touch[prop]=true; }, {passive:false});
  el.addEventListener('touchend',   function(e){ e.preventDefault(); touch[prop]=false;}, {passive:false});
}

// ─── GAME STATE ───────────────────────────────────────────────────────────────
var STATE = 'title'; // title | playing | dead | win
var lvlIdx = 0;
var deaths = 0;
var startTime = 0;
var deathTimer = 0;

// Player
var p = { x:0, y:0, vx:0, vy:0, onGround:false, jumpsLeft:2, w:PW, h:PH };

// Camera
var camX = 0;

// Particles
var particles = [];

function spawnParticles(x, y, color, n) {
  for (var i = 0; i < n; i++) {
    var angle = Math.random() * Math.PI * 2;
    var speed = 40 + Math.random() * 80;
    particles.push({
      x: x, y: y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1.0,
      color: color,
      r: 1 + Math.random() * 2
    });
  }
}

// ─── LEVEL LOAD ───────────────────────────────────────────────────────────────
function loadLevel(idx) {
  var lvl = LEVELS[idx];
  p.x = lvl.start[0];
  p.y = lvl.start[1] - PH;  // place feet at start y
  p.vx = 0; p.vy = 0;
  p.onGround = false;
  p.jumpsLeft = 2;
  camX = 0;
  particles = [];
}

// ─── COLLISION HELPERS ────────────────────────────────────────────────────────
function rectOverlap(ax,ay,aw,ah, bx,by,bw,bh) {
  return ax < bx+bw && ax+aw > bx && ay < by+bh && ay+ah > by;
}

// ─── UPDATE ───────────────────────────────────────────────────────────────────
var prevTime = 0;

// Jump edge detection
var spaceWasDown = false;
var gpAWasDown   = false;

function update(now) {
  var dt = Math.min((now - prevTime) / 1000, 0.05);
  prevTime = now;

  if (STATE === 'dead') {
    deathTimer -= dt;
    if (deathTimer <= 0) {
      loadLevel(lvlIdx);
      STATE = 'playing';
    }
    return;
  }
  if (STATE !== 'playing') return;

  var lvl = LEVELS[lvlIdx];

  // ── Gamepad ──
  var pad   = getGP();
  var gpA   = gpBtn(pad, 0);   // A = jump
  var gpR   = gpBtn(pad, 5);   // R = sprint
  var gpLX  = gpAxis(pad, 0);  // Circle pad X
  var gpDL  = gpBtn(pad, 14);
  var gpDR  = gpBtn(pad, 15);
  var gpDU  = gpBtn(pad, 12);

  // Jump: space bar or A button (edge detect)
  var spaceDown = !!(keys['Space'] || keys['ArrowUp'] || keys['KeyW'] || gpDU);
  var gpADown   = gpA;
  var jumpEdge  = (spaceDown && !spaceWasDown) || (gpADown && !gpAWasDown);
  spaceWasDown  = spaceDown;
  gpAWasDown    = gpADown;

  if (jumpEdge && p.jumpsLeft > 0) {
    p.vy = JUMP_VEL;
    p.jumpsLeft--;
    p.onGround = false;
    spawnParticles(p.x + PW/2, p.y + PH, '#ffffff', 6);
  }

  // Move
  var left    = !!(keys['KeyA'] || keys['ArrowLeft']  || gpDL || gpLX < 0 || touch.left);
  var right   = !!(keys['KeyD'] || keys['ArrowRight'] || gpDR || gpLX > 0 || touch.right);
  var sprint  = !!(keys['ShiftLeft'] || keys['ShiftRight'] || gpR || touch.sprint);
  var spd     = sprint ? SPRINT : SPEED;

  if (left)       p.vx = -spd;
  else if (right) p.vx =  spd;
  else            p.vx =  0;

  // Gravity
  p.vy += GRAVITY * dt;

  // Move X
  p.x += p.vx * dt;
  // Clamp to level bounds
  if (p.x < 0) p.x = 0;
  if (p.x + PW > lvl.width) p.x = lvl.width - PW;

  // Move Y
  p.y += p.vy * dt;
  p.onGround = false;

  // Platform collision (Y first, then clamped)
  var plats = lvl.platforms;
  for (var i = 0; i < plats.length; i++) {
    var pl = plats[i];
    if (!rectOverlap(p.x, p.y, PW, PH, pl.x, pl.y, pl.w, pl.h)) continue;

    // Coming from above — land
    if (p.vy >= 0 && p.y + PH - p.vy*dt <= pl.y + 2) {
      p.y = pl.y - PH;
      p.vy = 0;
      p.onGround = true;
      p.jumpsLeft = 2;
    }
    // Coming from below — bonk
    else if (p.vy < 0 && p.y - p.vy*dt >= pl.y + pl.h - 2) {
      p.y = pl.y + pl.h;
      p.vy = 0;
    }
  }

  // Death — fall off screen
  if (p.y > H + 30) {
    deaths++;
    spawnParticles(p.x + PW/2, H, '#ff4444', 12);
    STATE = 'dead';
    deathTimer = 0.7;
    return;
  }

  // Goal check
  var g = lvl.goal;
  if (rectOverlap(p.x, p.y, PW, PH, g.x, g.y, g.w, g.h)) {
    spawnParticles(g.x + g.w/2, g.y + g.h/2, '#ffd700', 20);
    if (lvlIdx >= LEVELS.length - 1) {
      STATE = 'win';
    } else {
      lvlIdx++;
      loadLevel(lvlIdx);
    }
    return;
  }

  // Camera: follow player, clamp to level
  var targetCam = p.x - W / 2 + PW / 2;
  var maxCam    = lvl.width - W;
  camX += (targetCam - camX) * 0.12;
  if (camX < 0)      camX = 0;
  if (camX > maxCam) camX = maxCam;

  // Particles
  for (var j = particles.length - 1; j >= 0; j--) {
    var pt = particles[j];
    pt.x  += pt.vx * dt;
    pt.y  += pt.vy * dt;
    pt.vy += GRAVITY * 0.3 * dt;
    pt.life -= dt * 2;
    if (pt.life <= 0) particles.splice(j, 1);
  }
}

// ─── DRAW ─────────────────────────────────────────────────────────────────────
function hexA(hex, a) {
  // Convert #rrggbb to rgba
  var r = parseInt(hex.slice(1,3),16);
  var g = parseInt(hex.slice(3,5),16);
  var b = parseInt(hex.slice(5,7),16);
  return 'rgba('+r+','+g+','+b+','+a+')';
}

function draw() {
  var lvl = LEVELS[lvlIdx];

  // Background
  ctx.fillStyle = (STATE === 'title' || STATE === 'win') ? '#050005' : lvl.bg;
  ctx.fillRect(0, 0, W, H);

  if (STATE === 'title') {
    drawTitle();
    return;
  }
  if (STATE === 'win') {
    drawWin();
    return;
  }

  // Stars (cheap parallax)
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  // deterministic star positions
  for (var s = 0; s < 40; s++) {
    var sx = ((s * 137 + 50) % W);
    var sy = ((s * 97  + 20) % (H - 30));
    // parallax: stars scroll at 20% speed
    var starX = (sx - camX * 0.05 + W * 10) % W;
    ctx.fillRect(starX, sy, 1, 1);
  }

  ctx.save();
  ctx.translate(-camX, 0);

  // Platforms
  var plats = lvl.platforms;
  for (var i = 0; i < plats.length; i++) {
    var pl = plats[i];
    ctx.fillStyle = pl.c;
    ctx.fillRect(pl.x, pl.y, pl.w, pl.h);
    // top highlight
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.fillRect(pl.x, pl.y, pl.w, 2);
  }

  // Goal (pulsing star)
  var g = lvl.goal;
  var pulse = 0.7 + 0.3 * Math.sin(Date.now() / 200);
  ctx.fillStyle = 'rgba(255,215,0,' + pulse + ')';
  ctx.fillRect(g.x, g.y, g.w, g.h);
  ctx.fillStyle = '#fff';
  ctx.fillRect(g.x + 7, g.y - 4, 6, 6); // little star on top
  ctx.fillRect(g.x + 4, g.y + 2, 12, 4);
  ctx.fillRect(g.x + 7, g.y + 8, 6, 6);

  // Player
  if (STATE === 'playing') {
    // Body
    ctx.fillStyle = '#ff4444';
    ctx.fillRect(p.x, p.y, PW, PH);
    // Eyes
    ctx.fillStyle = '#fff';
    ctx.fillRect(p.x + 2, p.y + 3, 3, 3);
    ctx.fillRect(p.x + 6, p.y + 3, 3, 3);
    ctx.fillStyle = '#000';
    ctx.fillRect(p.x + 3, p.y + 4, 1, 2);
    ctx.fillRect(p.x + 7, p.y + 4, 1, 2);
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(p.x + 1, p.y + PH, PW - 2, 2);
  }

  // Particles
  for (var j = 0; j < particles.length; j++) {
    var pt = particles[j];
    ctx.globalAlpha = pt.life;
    ctx.fillStyle   = pt.color;
    ctx.fillRect(pt.x - pt.r, pt.y - pt.r, pt.r*2, pt.r*2);
  }
  ctx.globalAlpha = 1;

  ctx.restore();

  // ── HUD ──
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, W, 18);

  ctx.font = 'bold 10px monospace';
  ctx.fillStyle = '#ffd700';
  ctx.fillText('LVL ' + (lvlIdx+1) + '/10', 5, 12);

  var elapsed = (Date.now() - startTime) / 1000;
  var mm = Math.floor(elapsed/60), ss = Math.floor(elapsed%60);
  if (ss < 10) ss = '0' + ss;
  ctx.fillStyle = '#aaf';
  ctx.fillText(mm+':'+ss, W/2 - 14, 12);

  ctx.fillStyle = '#f88';
  ctx.fillText('x' + deaths, W - 30, 12);

  // Progress bar
  var progress = (p.x + camX) / (lvl.width - W + p.x);
  ctx.fillStyle = 'rgba(255,215,0,0.2)';
  ctx.fillRect(0, H-3, W, 3);
  ctx.fillStyle = '#ffd700';
  ctx.fillRect(0, H-3, Math.min(W, W * (p.x / lvl.width)), 3);

  // Controls hint (fades after 5 seconds)
  var elapsed2 = (Date.now() - startTime) / 1000;
  if (elapsed2 < 5) {
    var alpha = elapsed2 < 4 ? 0.7 : (5 - elapsed2) * 0.7;
    ctx.fillStyle = 'rgba(0,0,0,' + (alpha * 0.6) + ')';
    ctx.fillRect(0, H - 22, W, 19);
    ctx.font = '8px monospace';
    ctx.fillStyle = 'rgba(255,220,100,' + alpha + ')';
    ctx.fillText('ARROWS/WASD:MOVE  UP/A:JUMP  SHIFT/R:SPRINT', 4, H - 10);
  }

  // Dead overlay
  if (STATE === 'dead') {
    ctx.fillStyle = 'rgba(200,0,0,0.4)';
    ctx.fillRect(0, 0, W, H);
    ctx.font = 'bold 16px monospace';
    ctx.fillStyle = '#ff4444';
    ctx.textAlign = 'center';
    ctx.fillText('OOPS!', W/2, H/2);
    ctx.textAlign = 'left';
  }
}

function drawTitle() {
  // Animated dots background
  var t = Date.now() / 1000;
  ctx.fillStyle = 'rgba(255,215,0,0.04)';
  for (var i = 0; i < 20; i++) {
    var dx = (i * 73 + t * 20) % W;
    var dy = (i * 53 + t * 15) % H;
    ctx.fillRect(dx, dy, 2, 2);
  }

  // Title
  ctx.textAlign = 'center';
  ctx.font = 'bold 28px monospace';
  ctx.fillStyle = '#ffd700';
  ctx.shadowColor = '#ff8800';
  ctx.shadowBlur  = 12;
  ctx.fillText('PARKOUR', W/2, 70);
  ctx.fillText('RUSH', W/2, 100);
  ctx.shadowBlur = 0;

  ctx.font = '8px monospace';
  ctx.fillStyle = '#888';
  ctx.fillText('10 LEVELS  |  2D PLATFORMER', W/2, 120);

  ctx.font = '9px monospace';
  ctx.fillStyle = '#aaa';
  ctx.fillText('ARROWS / WASD  =  MOVE', W/2, 148);
  ctx.fillText('UP / A  =  JUMP  (x2 double jump)', W/2, 160);
  ctx.fillText('SHIFT / R  =  SPRINT', W/2, 172);

  // Blink start text
  if (Math.floor(t * 2) % 2 === 0) {
    ctx.font = 'bold 11px monospace';
    ctx.fillStyle = '#ffd700';
    ctx.fillText('PRESS ANY KEY OR A TO START', W/2, 210);
  }
  ctx.textAlign = 'left';
}

function drawWin() {
  var t = Date.now() / 1000;

  // Gold sparkles
  for (var i = 0; i < particles.length; i++) {
    var pt = particles[i];
    ctx.globalAlpha = pt.life;
    ctx.fillStyle = pt.color;
    ctx.fillRect(pt.x - pt.r, pt.y - pt.r, pt.r*2, pt.r*2);
  }
  ctx.globalAlpha = 1;

  ctx.textAlign = 'center';
  ctx.font = 'bold 22px monospace';
  ctx.fillStyle = '#ffd700';
  ctx.shadowColor = '#ff8800'; ctx.shadowBlur = 14;
  ctx.fillText('YOU WIN!', W/2, 80);
  ctx.shadowBlur = 0;

  var elapsed = (Date.now() - startTime) / 1000;
  var mm = Math.floor(elapsed/60), ss = Math.floor(elapsed%60);
  if (ss < 10) ss = '0' + ss;

  ctx.font = '10px monospace';
  ctx.fillStyle = '#aaf';
  ctx.fillText('ALL 10 LEVELS COMPLETE', W/2, 108);
  ctx.fillStyle = '#fff';
  ctx.fillText('TIME: ' + mm + ':' + ss + '   DEATHS: ' + deaths, W/2, 124);

  if (Math.floor(t * 2) % 2 === 0) {
    ctx.font = 'bold 10px monospace';
    ctx.fillStyle = '#ffd700';
    ctx.fillText('PRESS ANY KEY TO PLAY AGAIN', W/2, 160);
  }
  ctx.textAlign = 'left';
}

// ─── START TRIGGER ────────────────────────────────────────────────────────────
function startGame() {
  lvlIdx = 0; deaths = 0;
  loadLevel(0);
  startTime = Date.now();
  STATE = 'playing';
  spaceWasDown = true; // prevent immediate jump on start
  gpAWasDown   = true;
}

document.addEventListener('keydown', function(e) {
  if (STATE === 'title' || STATE === 'win') {
    startGame();
  }
});
window.addEventListener('gamepadconnected', function() {});
// Poll for gamepad A press on title/win screens
var titlePollPrev = false;

// ─── LOOP ─────────────────────────────────────────────────────────────────────
function loop(now) {
  requestAnimationFrame(loop);

  // Gamepad title screen start
  var pad2 = getGP();
  var aDown = gpBtn(pad2, 0) || gpBtn(pad2, 8); // A or Start
  if ((STATE === 'title' || STATE === 'win') && aDown && !titlePollPrev) {
    startGame();
  }
  titlePollPrev = aDown;

  // Win screen particles
  if (STATE === 'win') {
    var dt2 = 0.016;
    if (Math.random() < 0.3) {
      spawnParticles(Math.random()*W, Math.random()*H*0.5, '#ffd700', 2);
    }
    for (var j = particles.length-1; j>=0; j--) {
      var pt = particles[j];
      pt.x += pt.vx * dt2; pt.y += pt.vy * dt2;
      pt.vy += 60 * dt2;
      pt.life -= dt2 * 1.5;
      if (pt.life <= 0) particles.splice(j,1);
    }
  }

  update(now);
  draw();
}

requestAnimationFrame(function(t) { prevTime = t; loop(t); });
</script>
